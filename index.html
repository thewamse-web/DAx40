<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAX 40 Eagle Eye Scanner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #131722; color: #d1d4dc; margin: 0; padding: 10px; overflow: hidden; }
        .layout { display: grid; grid-template-columns: 450px 1fr; gap: 10px; height: 98vh; }
        .sidebar { background: #1e222d; border-radius: 8px; border: 1px solid #363c4e; display: flex; flex-direction: column; padding: 10px; }
        .main-content { display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
        .chart-container { flex-grow: 1; background: #1e222d; border-radius: 8px; border: 1px solid #363c4e; overflow: hidden; }
        
        .refresh-btn {
            background-color: #2962ff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            width: 100%;
        }
        h3 { color: #2962ff; margin: 5px 0; font-size: 1.1em; text-align: center; }
        .strategy-note { font-size: 0.75em; color: #b2b5be; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="layout">
    <!-- VENSTRE SIDE: AUTOMATISK STRATEGI-SCREENER -->
    <div class="sidebar">
        <h3>DAX 40 Strategi-Scanner</h3>
        <div class="strategy-note">Sorteret efter RSI & MACD bekræftelse</div>
        <button class="refresh-btn" onclick="location.reload()">🔄 OPDATER SCANNER</button>
        
        <div style="flex-grow: 1;">
            <!-- TradingView Stock Screener Widget -->
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
                {
                  "width": "100%",
                  "height": "100%",
                  "defaultColumn": "technical_rating",
                  "defaultScreen": "most_capitalized",
                  "market": "germany",
                  "showToolbar": false,
                  "colorTheme": "dark",
                  "locale": "da_DK",
                  "symbols": {
                    "tickers": [
                      "XETR:ADS", "XETR:ALV", "XETR:BAS", "XETR:BAYN", "XETR:BEI", "XETR:BMW", "XETR:CON", 
                      "XETR:1COV", "XETR:DTG", "XETR:DB1", "XETR:DBK", "XETR:DHL", "XETR:DTE", "XETR:EON", 
                      "XETR:FRE", "XETR:HLD", "XETR:HEI", "XETR:HEN3", "XETR:IFX", "XETR:MBG", "XETR:MRK", 
                      "XETR:MTX", "XETR:MUV2", "XETR:PAH3", "XETR:PUM", "XETR:RWE", "XETR:SAP", "XETR:SRT3", 
                      "XETR:SIE", "XETR:SY1", "XETR:VOW3", "XETR:VNA", "XETR:ZAL", "XETR:RHM", "XETR:DB1"
                    ]
                  },
                  "columns": [
                    "base_currency_logoid",
                    "name",
                    "close",
                    "change",
                    "Relative_Strength_Index_14",
                    "MACD.macd",
                    "volume"
                  ]
                }
                </script>
            </div>
        </div>
    </div>

    <!-- HØJRE SIDE: DETALJERET GRAF -->
    <div class="main-content">
        <div class="chart-container">
            <div id="tv-chart" style="height: 100%;"></div>
        </div>
        
        <div style="height: 200px; background: #1e222d; border-radius: 8px; border: 1px solid #363c4e;">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                  "interval": "15m",
                  "width": "100%",
                  "isTransparent": true,
                  "height": "100%",
                  "symbol": "XETR:DAX",
                  "showIntervalTabs": true,
                  "displayMode": "multiple",
                  "locale": "da_DK",
                  "colorTheme": "dark"
                }
                </script>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script type="text/javascript">
    new TradingView.widget({
        "autosize": true,
        "symbol": "XETR:DAX",
        "interval": "15",
        "timezone": "Europe/Berlin",
        "theme": "dark",
        "style": "1",
        "locale": "da_DK",
        "studies": ["RSI@tv-basicstudies", "MACD@tv-basicstudies", "Volume@tv-basicstudies"],
        "container_id": "tv-chart"
    });
</script>

</body>
</html>
